name: Backup Guix Repository

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch:

permissions:
  actions: write

jobs:
  backup-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Clone full repository (mirror backup)
        run: |
          git clone --mirror https://github.com/monero-project/guix.git guix-repo-backup

      - name: Compress backup to tar.gz
        run: |
          BACKUP_NAME="guix-repo-full-backup-$(date +%Y%m%d-%H%M%S)"
          tar -zcvf "${BACKUP_NAME}.tar.gz" guix-repo-backup/
          echo "BACKUP_FILE=${BACKUP_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: guix-full-repository-backup
          path: ${{ env.BACKUP_FILE }}