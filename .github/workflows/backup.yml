name: 每日备份推master
on:
  schedule:
    - cron: '0 0 * * *'  
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: 检出master分支
        uses: actions/checkout@v4
        with:
          ref: master
          lfs: true  
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装 Git LFS
        run: |
          sudo apt-get install git-lfs
          git lfs install
          git lfs track "*.tar.gz"  
          git add .gitattributes

      - name: 克隆完整Guix仓库
        run: |
          git clone --mirror https://github.com/monero-project/guix.git guix-temp
          BACKUP_FILE="guix-repo-full-backup-$(date +%Y%m%d).tar.gz"
          tar -zcvf "$BACKUP_FILE" guix-temp/
          rm -rf guix-temp
          echo "BACKUP_FILE=$BACKUP_FILE" >> $GITHUB_ENV

      - name: 删除旧备份（保留3个）
        run: |
          ls -t guix-repo-full-backup-*.tar.gz | tail -n +4 | xargs -r rm -f
          git lfs prune  # 清理LFS旧文件

      - name: 提交并推送到master
        run: |
          git config --global user.name "actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "备份 ${{ env.BACKUP_FILE }} | 保留最新3个"
          git push origin master