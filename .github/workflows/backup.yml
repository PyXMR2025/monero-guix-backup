name: Package & Release Monero Guix

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'guix 仓库分支/标签'
        required: false
        default: 'main'
      release_tag:
        description: '发布版本号'
        required: false
        default: 'latest'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout monero-guix
        uses: actions/checkout@v4
        with:
          repository: monero-project/guix
          ref: ${{ inputs.branch }}
          fetch-depth: 1

      - name: Package files
        run: |
          PACKAGE_NAME="monero-guix-${{ inputs.release_tag }}-$(date +%Y%m%d)"
          tar -zcvf "${PACKAGE_NAME}.tar.gz" ./*
          zip -r "${PACKAGE_NAME}.zip" ./*
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: Monero Guix 打包文件 ${{ inputs.release_tag }}
          files: |
            ${{ env.PACKAGE_NAME }}.tar.gz
            ${{ env.PACKAGE_NAME }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}